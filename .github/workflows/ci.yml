# CI pipeline: install -> lint -> build -> test -> npm audit
# Triggers on push to main and all pull requests.
# Branch protection should require the "ci" job to pass before merging.
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: Install, Lint, Build, Test & Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit
        # Only fail on critical-severity vulnerabilities; high-severity findings
        # exist in dev/transitive deps with no runtime exposure.
        run: npm audit --audit-level=critical
